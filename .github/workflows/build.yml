name: Build Plugin

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]       # v1.0.0 这种 tag 触发 Release
  pull_request:
    branches: [ main ]
  workflow_dispatch:          # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Build
        run: |
          dotnet publish -c Release -o ./output --no-self-contained

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Emby.Plugin.MistyTheme
          path: output/Emby.Plugin.MistyTheme.dll
          if-no-files-found: error

  # 推 tag（如 v1.0.0）时自动创建 GitHub Release 并附上 DLL
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Emby.Plugin.MistyTheme
          path: ./dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Emby.Plugin.MistyTheme.dll
          generate_release_notes: true
