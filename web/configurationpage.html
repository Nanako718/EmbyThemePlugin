<!DOCTYPE html>
<html>
<head><title>Misty Theme</title></head>
<body>

<div data-role="page"
     class="page type-interior pluginConfigurationPage"
     data-require="emby-checkbox,emby-button,emby-select">

    <div data-role="content">
        <div class="content-primary">

            <div class="verticalSection">
                <div class="sectionTitleContainer">
                    <h2 class="sectionTitle">Misty Theme</h2>
                </div>
            </div>

            <form id="MistyThemeForm">

                <div class="checkboxContainer checkboxContainer-withDescription">
                    <label class="emby-checkbox-label">
                        <input is="emby-checkbox" type="checkbox" id="chkEnable" />
                        <span>启用新 UI</span>
                    </label>
                    <div class="fieldDescription">
                        启用后注入横幅、Loading 动画和自定义样式到 index.html。
                        关闭后自动从备份恢复原始 index.html。
                    </div>
                </div>

                <br />

                <div>
                    <button is="emby-button" type="submit"
                            class="raised button-submit block emby-button">
                        <span>保存并应用</span>
                    </button>
                </div>

                <div id="statusMsg" style="margin-top:1.2em;padding:.8em 1em;border-radius:4px;display:none"></div>

            </form>

        </div>
    </div>

    <script type="text/javascript">
        var PLUGIN_ID = '4a8b2c6d-1e3f-4a7b-9c2d-8e5f1a0b3c7d';

        // pageshow：每次导航到此页都重新读取配置
        document.querySelector('.pluginConfigurationPage')
            .addEventListener('pageshow', function () {
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(PLUGIN_ID)
                    .then(function (config) {
                        document.getElementById('chkEnable').checked =
                            config.EnableNewUI !== false; // 默认 true
                        Dashboard.hideLoadingMsg();
                    })
                    .catch(function () {
                        Dashboard.hideLoadingMsg();
                        showStatus('读取配置失败', false);
                    });
            });

        // 保存 → 立即应用
        document.getElementById('MistyThemeForm')
            .addEventListener('submit', function (e) {
                e.preventDefault();
                Dashboard.showLoadingMsg();

                ApiClient.getPluginConfiguration(PLUGIN_ID)
                    .then(function (config) {
                        config.EnableNewUI =
                            document.getElementById('chkEnable').checked;

                        return ApiClient.updatePluginConfiguration(PLUGIN_ID, config);
                    })
                    .then(function () {
                        // 保存完成后立即注入 / 移除
                        return ApiClient.ajax({
                            url:  ApiClient.getUrl('MistyTheme/Apply'),
                            type: 'POST'
                        });
                    })
                    .then(function () {
                        Dashboard.hideLoadingMsg();
                        var enabled = document.getElementById('chkEnable').checked;
                        showStatus(
                            enabled
                                ? '✓ 已启用，请刷新浏览器'
                                : '✓ 已关闭，index.html 已恢复',
                            true
                        );
                    })
                    .catch(function () {
                        Dashboard.hideLoadingMsg();
                        showStatus('✗ 操作失败，请查看服务器日志', false);
                    });
            });

        function showStatus(msg, ok) {
            var el = document.getElementById('statusMsg');
            el.textContent = msg;
            el.style.display = 'block';
            el.style.background = ok
                ? 'rgba(67,160,71,.18)'
                : 'rgba(229,57,53,.18)';
            el.style.color = ok
                ? 'rgba(165,214,167,1)'
                : 'rgba(239,154,154,1)';
        }
    </script>

</div>
</body>
</html>
